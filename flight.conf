# ==============================================================================
# FLIGHT DISPATCHER ENGINE - USER CONFIGURATION PROFILE
# ==============================================================================

# --- [ Pilot Preferences & Core Metrics ] ------------------------------------
VEHICLE_TIER="${VEHICLE_TIER:-small_airplane}"
HOME_ICAO="LGHI"
CITIES_ALERT_THRESHOLD=5

# Gatekeepers: Set to 'true' for a pre-flight confirmation prompt, 'false' to auto-commit
CONFIRMATION=false  

# Set a two-letter prefix here to enforce it (e.g., "el" or "en").
# Leave it blank "" to automatically detect it from your system's $LANG layout.
# Stories default to LOCALIZATION="en".
LOCALIZATION=""


# --- [ External Database Providers & Infrastructure ] ------------------------
# Options: "GLOBAL" (All OurAirports data) or "LNM" (Restricted to verified fields)
DB_SOURCE="LNM" 

DB_URL="https://davidmegginson.github.io/ourairports-data/airports.csv"
LNM_DB="$HOME/my_github/bingo-flight/test_files/little_navmap_navigraph.sqlite"


# ==============================================================================
# SUB-ENGINE ENVIRONMENT BRIDGE
# ==============================================================================
# These parameters must be explicitly exported together so that external python 
# block parsers and localized narrative assets can view them outside the Bash scope.
export VEHICLE_TIER LOCALIZATION
