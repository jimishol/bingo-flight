# flight_tiers.conf - per-tier baggage parameters (units are abstract)
# Valid types: heliport, small_airplane, medium_airplane, large_airplane

[small_airplane]
max_baggage=121
threshold_medium=40
threshold_heavy=80

[heliport]
max_baggage=40
threshold_medium=15
threshold_heavy=30

[medium_airplane]
max_baggage=200
threshold_medium=60
threshold_heavy=120

[large_airplane]
max_baggage=400
threshold_medium=120
threshold_heavy=240
