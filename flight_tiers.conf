# ==============================================================================
# FLIGHT DISPATCHER ENGINE - VEHICLE TIER CONFIGURATION CONFIG
# ==============================================================================
# This blueprint defines parameters for baggage classes, crew configurations, 
# passenger generation weights, and structural zone labels.
# Valid types referenced by engine: helicopter, small_airplane, medium_airplane, large_airplane
# Note: Units used throughout weights and cargo spaces are abstract framework metrics.

# ------------------------------------------------------------------------------
# SMALL AIRPLANE RULES (e.g., Cessna 172, Piper PA-28, Beechcraft Baron)
# ------------------------------------------------------------------------------
[small_airplane]
# Weight capacity boundaries for random baggage assignment profiles
max_baggage=120          # Maximum total abstract weight cargo space can physically hold
threshold_medium=40     # Weights above this flag the baggage profile as 'medium'
threshold_heavy=80      # Weights above this flag the baggage profile as 'heavy'

# Fixed baseline operating constants
crew=210                # Base structural operating weight allocated for pilot/co-pilot seats
pax_min=90              # Minimum possible generated baseline weight for a single passenger
pax_range=120           # Dynamic range added randomly to pax_min (Max passenger weight = min + range)

# Structural aircraft cabin layout mappings
seats_per_zone=1        # Number of seats tied to each independent passenger zone
pax1_label=Passenger 1  # User display string label printed for the first seat/cabin zone
pax2_label=Passenger 2  # User display string label printed for the second seat/cabin zone
pax3_label=Passenger 3  # User display string label printed for the third seat/cabin zone

# High-adventure expedition presets
journey_zones=3         # Number of cargo zones used during multi-leg long-distance trips
journey_cargo=137 177 126 # Space-separated fixed cargo manifest items generated for journey stages


# ------------------------------------------------------------------------------
# HELICOPTER RULES (e.g., Bell 206, Robinson R44, Eurocopter EC135)
# ------------------------------------------------------------------------------
[helicopter]
max_baggage=40          # Highly restrictive structural storage space capacity
threshold_medium=15     # Minimal tolerance before weight shifts center of gravity to medium
threshold_heavy=30      # Max practical baggage ceiling for rotary platforms
crew=210
pax_min=90
pax_range=120
seats_per_zone=1
pax1_label=Passenger 1
pax2_label=Passenger 2
pax3_label=Passenger 3
journey_zones=3
journey_cargo=137 177 126


# ------------------------------------------------------------------------------
# MEDIUM AIRPLANE RULES (e.g., ATR 72, Bombardier CRJ, Boeing 737, Airbus A320)
# ------------------------------------------------------------------------------
[medium_airplane]
max_baggage=10000       # Commercial transport cargo capacity
threshold_medium=3000   # Lower boundary for medium airline luggage load assignments
threshold_heavy=6000    # Boundary threshold indicating heavy freight loading
crew=380                # Combined flight crew allocations (Captain, First Officer, Lead Attendant)
pax_min=110
pax_range=140           # Reflects higher potential payload variance across airliner classes

# Mass passenger transport layout configuration
seats_per_zone=12       # Passengers are grouped collectively into row segments instead of single seats
pax1_label=Zone A       # Forward cabin section packaging label
pax2_label=Zone B       # Mid cabin section packaging label
pax3_label=Zone C       # Aft cabin section packaging label
journey_zones=3
journey_cargo=1940 2910 3870 # Mass freight parameters for fleet logistics simulations


# ------------------------------------------------------------------------------
# LARGE AIRPLANE RULES (e.g., Boeing 777, Boeing 747, Airbus A350, Airbus A380)
# ------------------------------------------------------------------------------
[large_airplane]
max_baggage=30000
threshold_medium=9000
threshold_heavy=18000
crew=570                # Reflects large flight deck complement plus distributed cabin crew
pax_min=130
pax_range=150
seats_per_zone=30       # High-density passenger tracking blocks
pax1_label=Zone A
pax2_label=Zone B
pax3_label=Zone C
journey_zones=3
journey_cargo=3980 5070 7960
